name: Precious
permissions:
  contents: read

on:
  push:
    branches:
      - 'main'
  pull_request:
  workflow_dispatch:

jobs:
  code-formatting:
    runs-on: ubuntu-latest
    name: Code Formatting
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Always lint the whole repo, on both PRs and pushes to main. Linting
      # only the files changed in a PR would miss reformats caused by the PR
      # itself -- e.g. a dependency bump that changes a formatter's version can
      # reformat files outside the diff, which would then slip past PR CI and
      # only break on push to main. The repo is small, so linting everything is
      # cheap.
      - name: Lint files
        run: precious lint --all
